<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ficha · Asesoría Castresana</title>
<style>
:root{--oro:#c9a24b;--oro2:#e7c879;--tinta:#16202b;--gris:#5b6675;--linea:#e7e9ee;--bg:#f4f5f7}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tinta);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:820px;margin:0 auto;padding:16px}
.btnbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.btn{background:var(--tinta);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;font-size:14px}
.btn.oro{background:linear-gradient(135deg,var(--oro),var(--oro2));color:#1a1205}
.muted{color:var(--gris);font-size:13px}
/* PORTADA 9:16 lista para Estado de WhatsApp */
.portada{position:relative;width:360px;max-width:100%;aspect-ratio:9/16;border-radius:18px;overflow:hidden;margin:0 auto;box-shadow:0 14px 40px rgba(0,0,0,.25);background:#222}
.portada img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.portada .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 28%,rgba(0,0,0,0) 45%,rgba(0,0,0,.82) 100%)}
.portada .top{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:center;color:#fff}
.brand{font-weight:800;letter-spacing:.5px;font-size:14px;text-shadow:0 1px 6px rgba(0,0,0,.6)}
.tag{background:var(--oro);color:#1a1205;font-weight:800;font-size:12px;padding:5px 9px;border-radius:20px}
.portada .bot{position:absolute;left:18px;right:18px;bottom:20px;color:#fff}
.portada .precio{font-size:34px;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.7);line-height:1}
.portada .tit{font-size:16px;font-weight:600;margin:8px 0 10px;text-shadow:0 1px 8px rgba(0,0,0,.8)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.18);backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,.35);color:#fff;font-weight:700;font-size:13px;padding:6px 10px;border-radius:20px}
.cta{margin-top:12px;font-size:13px;font-weight:700;background:var(--oro);color:#1a1205;display:inline-block;padding:7px 12px;border-radius:8px}
/* DOSSIER */
.card{background:#fff;border:1px solid var(--linea);border-radius:16px;padding:20px;margin-top:16px}
h1{font-size:22px;margin:0 0 4px}
.precio2{font-size:26px;font-weight:900;color:var(--tinta)}
.specs{display:flex;gap:18px;flex-wrap:wrap;margin:12px 0;border-top:1px solid var(--linea);border-bottom:1px solid var(--linea);padding:12px 0}
.spec b{display:block;font-size:20px}
.spec span{color:var(--gris);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.desc{line-height:1.6;color:#26313d;white-space:pre-wrap}
.galeria{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px}
.galeria img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px}
.foot{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:16px;border-top:2px solid var(--oro);padding-top:14px}
.foot .c{font-weight:800}
.loading{text-align:center;padding:60px 20px;color:var(--gris)}
@media print{.btnbar,.noprint{display:none!important}body{background:#fff}.portada{box-shadow:none;page-break-after:always}.card{border:none;padding:0}}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="loading">Cargando ficha…</div></div>
</div>
<script>
var API='https://qwljkqisnupjgzbdyzym.supabase.co/functions/v1/cockpit';
function qs(k){return new URLSearchParams(location.search).get(k)||'';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function go(){
  var ref=qs('ref').toUpperCase().trim();
  var app=document.getElementById('app');
  if(!ref){app.innerHTML='<div class="loading">Falta la referencia. Usa ?ref=PIS0193 al final del enlace.</div>';return;}
  try{
    var r=await fetch(API+'?p=ficha&ref='+encodeURIComponent(ref));
    var j=await r.json();
    if(!j.ok){app.innerHTML='<div class="loading">No se encontró el inmueble '+esc(ref)+'.</div>';return;}
    render(j.ficha);
  }catch(e){app.innerHTML='<div class="loading">Error cargando la ficha.</div>';}
}
function render(f){
  var chips='';
  if(f.m2)chips+='<span class="chip">📐 '+esc(f.m2)+' m²</span>';
  if(f.hab)chips+='<span class="chip">🛏 '+esc(f.hab)+' hab</span>';
  if(f.banos)chips+='<span class="chip">🛁 '+esc(f.banos)+' baños</span>';
  var specs='';
  if(f.precio)specs+='<div class="spec"><b>'+esc(f.precio)+'</b><span>Precio</span></div>';
  if(f.m2)specs+='<div class="spec"><b>'+esc(f.m2)+' m²</b><span>Sup. útil</span></div>';
  if(f.hab)specs+='<div class="spec"><b>'+esc(f.hab)+'</b><span>Habitaciones</span></div>';
  if(f.banos)specs+='<div class="spec"><b>'+esc(f.banos)+'</b><span>Baños</span></div>';
  var gal=(f.fotos||[]).slice(0,12).map(function(u){return '<img loading="lazy" src="'+u+'"/>'}).join('');
  var html=''
   +'<div class="btnbar noprint">'
   +'<button class="btn oro" onclick="window.print()">⬇️ Guardar como PDF</button>'
   +'<a class="btn" href="'+esc(f.url)+'" target="_blank">Ver en la web</a>'
   +'<a class="btn" href="https://wa.me/34689929926" target="_blank">WhatsApp</a>'
   +'</div>'
   +'<div class="portada">'
   +(f.portada?'<img src="'+esc(f.portada)+'"/>':'')
   +'<div class="grad"></div>'
   +'<div class="top"><span class="brand">ASESORÍA CASTRESANA</span><span class="tag">EN VENTA</span></div>'
   +'<div class="bot">'
   +(f.precio?'<div class="precio">'+esc(f.precio)+'</div>':'')
   +'<div class="tit">'+esc(f.titulo||'')+'</div>'
   +'<div class="chips">'+chips+'</div>'
   +'<div class="cta">📲 689 929 926 · asesoriacastresana.com</div>'
   +'</div></div>'
   +'<p class="muted noprint" style="text-align:center">Esta tarjeta es tu portada para el Estado de WhatsApp: haz una captura. Debajo tienes el dossier completo (botón “Guardar como PDF”).</p>'
   +'<div class="card">'
   +'<h1>'+esc(f.titulo||'Inmueble '+f.ref)+'</h1>'
   +'<div class="muted">Ref. '+esc(f.ref)+'</div>'
   +(f.precio?'<div class="precio2" style="margin-top:8px">'+esc(f.precio)+'</div>':'')
   +'<div class="specs">'+specs+'</div>'
   +'<div class="desc">'+esc((f.texto||f.resumen||'').trim())+'</div>'
   +(gal?'<div class="galeria">'+gal+'</div>':'')
   +'<div class="foot"><div class="c">Asesoría Castresana · Oviedo (Asturias)</div><div class="c">📲 689 929 926 · 985 210 468 · asesoriacastresana.com</div></div>'
   +'</div>';
  document.getElementById('app').innerHTML=html;
  document.title=(f.titulo||f.ref)+' · Castresana';
}
go();
</script>
</body>
</html>
